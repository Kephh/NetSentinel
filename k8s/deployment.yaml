apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-service-with-netsentinel
  labels:
    app: sample-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-service
  template:
    metadata:
      labels:
        app: sample-service
    spec:
      containers:
        - name: sample-service
          image: ghcr.io/example/sample-service:latest
          ports:
            - containerPort: 9001
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
        - name: netsentinel-sidecar
          image: ghcr.io/example/netsentinel:0.1.0
          args: ["/app/config/netsentinel.json"]
          ports:
            - name: proxy
              containerPort: 8080
            - name: metrics
              containerPort: 9090
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: netsentinel-config
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: netsentinel-config
          configMap:
            name: netsentinel-config
