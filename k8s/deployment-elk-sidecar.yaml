apiVersion: v1
kind: ConfigMap
metadata:
  name: netsentinel-filebeat-config
  labels:
    app: sample-service

data:
  filebeat.yml: |
    filebeat.inputs:
      - type: filestream
        id: netsentinel-audit
        enabled: true
        paths:
          - /var/log/netsentinel/audit.log
        parsers:
          - ndjson:
              overwrite_keys: true
              add_error_key: true

    output.logstash:
      hosts:
        - logstash.observability.svc.cluster.local:5044
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-service-with-netsentinel-elk
  labels:
    app: sample-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-service
  template:
    metadata:
      labels:
        app: sample-service
    spec:
      containers:
        - name: sample-service
          image: ghcr.io/example/sample-service:latest
          ports:
            - containerPort: 9001
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
        - name: netsentinel-sidecar
          image: ghcr.io/example/netsentinel:0.1.0
          args: ["/app/config/netsentinel-elk.json"]
          ports:
            - name: proxy
              containerPort: 8080
            - name: metrics
              containerPort: 9090
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: netsentinel-config
              mountPath: /app/config
              readOnly: true
            - name: netsentinel-audit-logs
              mountPath: /var/log/netsentinel
        - name: filebeat-sidecar
          image: docker.elastic.co/beats/filebeat:8.15.5
          args:
            - "-e"
            - "-c"
            - "/usr/share/filebeat/filebeat.yml"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: netsentinel-audit-logs
              mountPath: /var/log/netsentinel
              readOnly: true
            - name: filebeat-config
              mountPath: /usr/share/filebeat/filebeat.yml
              subPath: filebeat.yml
              readOnly: true
      volumes:
        - name: netsentinel-config
          configMap:
            name: netsentinel-config
        - name: netsentinel-audit-logs
          emptyDir: {}
        - name: filebeat-config
          configMap:
            name: netsentinel-filebeat-config
